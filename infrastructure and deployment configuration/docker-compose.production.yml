version: '3.8'

services:
  app:
    image: abena-ihr:${VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
      - sdk-service
    volumes:
      - uploads:/app/uploads
      - sdk-cache:/app/sdk-cache
    networks:
      - app-network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  sdk-service:
    image: abena-shared-sdk:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SDK_PORT: 3001
      SDK_CACHE_TTL: 3600
      SDK_RETRY_ATTEMPTS: 3
      SDK_TIMEOUT: 30000
    env_file:
      - .env.production
    volumes:
      - sdk-cache:/app/cache
      - sdk-logs:/app/logs
    networks:
      - app-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/backup:/backup
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_files:/var/www/html:ro
    depends_on:
      - app
      - sdk-service
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  static_files:
    driver: local
  sdk-cache:
    driver: local
  sdk-logs:
    driver: local

networks:
  app-network:
    driver: bridge 