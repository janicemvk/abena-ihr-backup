# docker-compose.yml for Abena IHR Platform with SDK Services
version: '3.8'

services:
  # Abena SDK Services
  abena-auth:
    image: abena/auth-service:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your_jwt_secret
    volumes:
      - auth_data:/app/data

  abena-data:
    image: abena/data-service:latest
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:pass@postgres:5432/abena_data
    depends_on:
      - postgres

  abena-privacy:
    image: abena/privacy-service:latest
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - ENCRYPTION_KEY=your_encryption_key

  abena-blockchain:
    image: abena/blockchain-service:latest
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
      - BLOCKCHAIN_NETWORK=private

  # Dynamic Learning Platform
  learning-platform:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ABENA_API_KEY=your_api_key
      - AUTH_SERVICE_URL=http://abena-auth:3001
      - DATA_SERVICE_URL=http://abena-data:8001
      - PRIVACY_SERVICE_URL=http://abena-privacy:8002
      - BLOCKCHAIN_SERVICE_URL=http://abena-blockchain:8003
      - ENVIRONMENT=production
    depends_on:
      - abena-auth
      - abena-data
      - abena-privacy
      - abena-blockchain
    volumes:
      - ./app:/app/app
      - learning_data:/app/data

  # Supporting Services
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=abena_data
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  auth_data:
  learning_data:
  postgres_data:
  redis_data: 