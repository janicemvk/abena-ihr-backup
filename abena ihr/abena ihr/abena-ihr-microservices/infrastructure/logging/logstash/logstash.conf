input {
  beats {
    port => 5044
    ssl => false
  }
  
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Healthcare data anonymization
  if [fields][service] == "patient-engagement" or [fields][service] == "clinical-decision-support" {
    mutate {
      add_field => { "data_classification" => "PHI" }
    }
    
    # Anonymize patient identifiers
    if [message] =~ /patient_id/ {
      ruby {
        code => '
          require "digest"
          if event.get("patient_id")
            event.set("patient_id_hash", Digest::SHA256.hexdigest(event.get("patient_id")))
            event.remove("patient_id")
          end
        '
      }
    }
    
    # Anonymize provider identifiers
    if [message] =~ /provider_id/ {
      ruby {
        code => '
          require "digest"
          if event.get("provider_id")
            event.set("provider_id_hash", Digest::SHA256.hexdigest(event.get("provider_id")))
            event.remove("provider_id")
          end
        '
      }
    }
  }
  
  # Security event processing
  if [fields][service] == "privacy-security" {
    mutate {
      add_field => { "data_classification" => "SECURITY" }
    }
    
    # Extract security event details
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:security_event}" }
    }
    
    # Categorize security events
    if [security_event] =~ /authentication.*failed/ {
      mutate {
        add_field => { "security_category" => "AUTH_FAILURE" }
      }
    } else if [security_event] =~ /data.*access.*denied/ {
      mutate {
        add_field => { "security_category" => "ACCESS_DENIED" }
      }
    } else if [security_event] =~ /encryption.*operation/ {
      mutate {
        add_field => { "security_category" => "ENCRYPTION" }
      }
    }
  }
  
  # Clinical decision support events
  if [fields][service] == "clinical-decision-support" {
    mutate {
      add_field => { "data_classification" => "CLINICAL" }
    }
    
    # Extract clinical decision details
    if [message] =~ /clinical.*decision/ {
      grok {
        match => { "message" => ".*decision_accuracy.*%{NUMBER:accuracy}.*" }
      }
      
      mutate {
        convert => { "accuracy" => "float" }
      }
    }
  }
  
  # Data ingestion events
  if [fields][service] == "data-ingestion" {
    mutate {
      add_field => { "data_classification" => "DATA_PROCESSING" }
    }
    
    # Extract data processing metrics
    if [message] =~ /processed.*records/ {
      grok {
        match => { "message" => ".*processed.*%{NUMBER:records_processed}.*records.*" }
      }
      
      mutate {
        convert => { "records_processed" => "integer" }
      }
    }
  }
  
  # Blockchain events
  if [fields][service] == "blockchain" {
    mutate {
      add_field => { "data_classification" => "BLOCKCHAIN" }
    }
    
    # Extract blockchain transaction details
    if [message] =~ /transaction.*committed/ {
      grok {
        match => { "message" => ".*transaction.*%{DATA:transaction_hash}.*committed.*" }
      }
    }
  }
  
  # Add timestamp if missing
  if ![@timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Add environment tag
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:production}" }
  }
  
  # Add cluster information
  mutate {
    add_field => { "cluster" => "abena-ihr-prod" }
  }
  
  # Remove sensitive fields
  mutate {
    remove_field => [ "password", "token", "secret", "key" ]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "abena-ihr-logs-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    ssl => true
    ssl_certificate_verification => false
    template_name => "abena-ihr-logs"
    template => {
      "index_patterns" => ["abena-ihr-logs-*"]
      "settings" => {
        "number_of_shards" => 3
        "number_of_replicas" => 1
        "index.lifecycle.name" => "abena-ihr-logs-policy"
        "index.lifecycle.rollover_alias" => "abena-ihr-logs"
      }
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" }
          "level" => { "type" => "keyword" }
          "service" => { "type" => "keyword" }
          "data_classification" => { "type" => "keyword" }
          "security_category" => { "type" => "keyword" }
          "patient_id_hash" => { "type" => "keyword" }
          "provider_id_hash" => { "type" => "keyword" }
          "accuracy" => { "type" => "float" }
          "records_processed" => { "type" => "integer" }
          "transaction_hash" => { "type" => "keyword" }
          "environment" => { "type" => "keyword" }
          "cluster" => { "type" => "keyword" }
          "message" => { "type" => "text" }
        }
      }
    }
  }
  
  # Send security events to separate index
  if [data_classification] == "SECURITY" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "abena-ihr-security-%{+YYYY.MM.dd}"
      user => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
      ssl => true
      ssl_certificate_verification => false
    }
  }
  
  # Send clinical events to separate index
  if [data_classification] == "CLINICAL" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "abena-ihr-clinical-%{+YYYY.MM.dd}"
      user => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
      ssl => true
      ssl_certificate_verification => false
    }
  }
  
  # Console output for debugging
  stdout {
    codec => rubydebug
  }
} 