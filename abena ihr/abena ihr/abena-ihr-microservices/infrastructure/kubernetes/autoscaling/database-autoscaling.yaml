apiVersion: autoscaling/v2
kind: VerticalPodAutoscaler
metadata:
  name: postgres-vpa
  namespace: abena-ihr
  labels:
    app: postgres
    version: v1
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: postgres
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      minAllowed:
        cpu: 100m
        memory: 256Mi
      maxAllowed:
        cpu: 2
        memory: 4Gi
      controlledValues: RequestsAndLimits
---
apiVersion: autoscaling/v2
kind: VerticalPodAutoscaler
