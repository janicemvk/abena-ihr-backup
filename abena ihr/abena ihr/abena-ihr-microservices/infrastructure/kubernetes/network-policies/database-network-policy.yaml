apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: application-network-policy
  namespace: abena-ihr
  labels:
    app: abena-ihr
    version: v1
spec:
  podSelector:
    matchLabels:
      app: abena-ihr
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from nginx
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8080
  # Allow internal service communication
  - from:
    - podSelector:
        matchLabels:
          app: patient-engagement
    - podSelector:
        matchLabels:
          app: data-ingestion
    - podSelector:
        matchLabels:
          app: clinical-decision-support
    - podSelector:
        matchLabels:
          app: privacy-security
    - podSelector:
        matchLabels:
          app: blockchain
    - podSelector:
        matchLabels:
          app: auth
  egress:
  # Allow database access
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external API calls for healthcare integrations
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 53
  # Allow monitoring
  - to:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 16686
  # Allow logging
  - to:
    - namespaceSelector:
        matchLabels:
          name: logging
    ports:
    - protocol: TCP
      port: 9200
    - protocol: TCP
      port: 5044 