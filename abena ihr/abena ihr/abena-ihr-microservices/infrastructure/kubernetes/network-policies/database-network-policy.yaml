apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: abena-ihr
  labels:
    app: postgres
    version: v1
spec:
  podSelector:
    matchLabels:
      app: postgres
      version: v1
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow connections from application services
  - from:
    - podSelector:
        matchLabels:
          app: patient-engagement
    - podSelector:
        matchLabels:
          app: data-ingestion
    - podSelector:
        matchLabels:
          app: clinical-decision-support
    - podSelector:
        matchLabels:
          app: privacy-security
    - podSelector:
        matchLabels:
          app: blockchain
    - podSelector:
        matchLabels:
          app: auth
    ports:
    - protocol: TCP
      port: 5432
  # Allow Prometheus scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9187
  egress:
  # Allow outbound connections for replication and backups
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 53
---
