apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: abena-ihr
  labels:
    app: postgres
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
  - name: metrics
    port: 9187
    targetPort: 9187
    protocol: TCP
  selector:
    app: postgres
    version: v1
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: abena-ihr
  labels:
    app: redis
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  - name: metrics
    port: 9121
    targetPort: 9121
    protocol: TCP
  selector:
    app: redis
    version: v1
  sessionAffinity: None 