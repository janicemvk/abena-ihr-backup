version: '3.9'
services:
  clinical-decision-support:
    build: .
    container_name: clinical-decision-support
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clinical
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    networks:
      - abena-net

  redis:
    image: redis:7-alpine
    container_name: cds-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - abena-net

  db:
    image: postgres:15-alpine
    container_name: cds-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinical
    ports:
      - "5434:5432"
    volumes:
      - cds-db-data:/var/lib/postgresql/data
    networks:
      - abena-net

volumes:
  cds-db-data:

networks:
  abena-net:
    driver: bridge 