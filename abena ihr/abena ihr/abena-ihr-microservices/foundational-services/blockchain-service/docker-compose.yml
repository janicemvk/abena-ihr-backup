version: '3.8'

services:
  blockchain-service:
    build: .
    container_name: abena-blockchain-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - MONGO_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - FABRIC_CONFIG_PATH=./config/connection.yaml
      - CHANNEL_NAME=healthchannel
      - CHAINCODE_NAME=healthrecords
      - ORGANIZATION=Org1MSP
      - USER_NAME=User1
    depends_on:
      - mongo
      - redis
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - abena-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: abena-blockchain-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=abena_ihr
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - abena-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: abena-blockchain-redis
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - abena-network
    restart: unless-stopped

