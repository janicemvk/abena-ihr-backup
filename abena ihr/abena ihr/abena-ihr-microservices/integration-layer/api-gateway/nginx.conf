# Abena IHR API Gateway Configuration
# Main NGINX configuration for microservices routing

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # Upstream definitions for microservices
    upstream auth_service {
        least_conn;
        server auth-service:3000 max_fails=3 fail_timeout=30s;
        server auth-service-2:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream patient_engagement {
        least_conn;
        server patient-engagement-service:8000 max_fails=3 fail_timeout=30s;
        server patient-engagement-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream provider_workflow {
        least_conn;
        server provider-workflow-service:8000 max_fails=3 fail_timeout=30s;
        server provider-workflow-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream clinical_decision_support {
        least_conn;
        server clinical-decision-support-service:8000 max_fails=3 fail_timeout=30s;
        server clinical-decision-support-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream data_ingestion {
        least_conn;
        server data-ingestion-service:8000 max_fails=3 fail_timeout=30s;
        server data-ingestion-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream privacy_security {
        least_conn;
        server privacy-security-service:8000 max_fails=3 fail_timeout=30s;
        server privacy-security-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream telemedicine {
        least_conn;
        server telemedicine-service:8000 max_fails=3 fail_timeout=30s;
        server telemedicine-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream analytics_engine {
        least_conn;
        server analytics-engine-service:8000 max_fails=3 fail_timeout=30s;
        server analytics-engine-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream science_intelligence {
        least_conn;
        server science-intelligence-service:8000 max_fails=3 fail_timeout=30s;
        server science-intelligence-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream unified_data {
        least_conn;
        server unified-data-service:5432 max_fails=3 fail_timeout=30s;
        server unified-data-service-2:5432 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream blockchain {
        least_conn;
        server blockchain-service:8080 max_fails=3 fail_timeout=30s;
        server blockchain-service-2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Health check endpoint
    server {
        listen 80;
        server_name health.abena-ihr.com;
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Main API Gateway server
    server {
        listen 80;
        listen 443 ssl http2;
        server_name api.abena-ihr.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/abena-ihr.crt;
        ssl_certificate_key /etc/nginx/ssl/abena-ihr.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

        # Authentication service routes
        location /auth/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Patient engagement service routes
        location /patient/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://patient_engagement/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Provider workflow service routes
        location /provider/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://provider_workflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Clinical decision support service routes
        location /clinical/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://clinical_decision_support/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Data ingestion service routes
        location /ingestion/ {
            limit_req zone=upload burst=10 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://data_ingestion/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Privacy and security service routes
        location /privacy/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://privacy_security/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Telemedicine service routes
        location /telemedicine/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://telemedicine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support for video calls
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Analytics engine service routes
        location /analytics/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://analytics_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Science intelligence service routes
        location /science/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://science_intelligence/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Blockchain service routes
        location /blockchain/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://blockchain/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Unified data service routes
        location /data/ {
            limit_req zone=api burst=20 nodelay;
            
            # JWT token validation
            auth_request /auth/validate;
            
            proxy_pass http://unified_data/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Authentication validation endpoint
        location = /auth/validate {
            internal;
            proxy_pass http://auth_service/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Metrics endpoint for monitoring
        location /metrics {
            access_log off;
            stub_status on;
        }

        # Default error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
} 