# Abena IHR API Gateway Rate Limiting Configuration
# Defines rate limiting rules for different endpoints and user types

# Rate limiting zones
# General API rate limiting
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=20r/s;

# Authentication rate limiting
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=register:10m rate=2r/m;
limit_req_zone $binary_remote_addr zone=password_reset:10m rate=1r/m;

# Data upload rate limiting
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=large_upload:10m rate=1r/s;

# Telemedicine rate limiting
limit_req_zone $binary_remote_addr zone=video_call:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=video_stream:10m rate=5r/s;

# Analytics and reporting rate limiting
limit_req_zone $binary_remote_addr zone=analytics:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=reports:10m rate=2r/s;

# Blockchain operations rate limiting
limit_req_zone $binary_remote_addr zone=blockchain:10m rate=3r/s;

# User-based rate limiting (requires authentication)
limit_req_zone $http_authorization zone=user_api:10m rate=50r/s;
limit_req_zone $http_authorization zone=user_upload:10m rate=10r/s;

# IP-based rate limiting for different user types
limit_req_zone $binary_remote_addr zone=patient_api:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=provider_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=100r/s;

# Geographic rate limiting (if using GeoIP)
# limit_req_zone $geoip_country_code zone=us_api:10m rate=20r/s;
# limit_req_zone $geoip_country_code zone=eu_api:10m rate=15r/s;

# Rate limiting map for different endpoints
map $request_uri $rate_limit_zone {
    # Authentication endpoints
    ~^/auth/login$ "login";
    ~^/auth/register$ "register";
    ~^/auth/password-reset$ "password_reset";
    ~^/auth/.*$ "api_general";
    
    # Patient endpoints
    ~^/patient/dashboard$ "patient_api";
    ~^/patient/appointments$ "patient_api";
    ~^/patient/health-tracking$ "patient_api";
    ~^/patient/.*$ "api_general";
    
    # Provider endpoints
    ~^/provider/workflow$ "provider_api";
    ~^/provider/schedule$ "provider_api";
    ~^/provider/patients$ "provider_api";
    ~^/provider/.*$ "api_general";
    
    # Clinical decision support
    ~^/clinical/.*$ "api_general";
    
    # Data ingestion
    ~^/ingestion/vitals$ "upload";
    ~^/ingestion/labs$ "upload";
    ~^/ingestion/medications$ "upload";
    ~^/ingestion/hl7$ "large_upload";
    ~^/ingestion/fhir$ "large_upload";
    ~^/ingestion/.*$ "api_general";
    
    # Privacy and security
    ~^/privacy/.*$ "api_general";
    
    # Telemedicine
    ~^/telemedicine/video-call$ "video_call";
    ~^/telemedicine/stream$ "video_stream";
    ~^/telemedicine/.*$ "api_general";
    
    # Analytics
    ~^/analytics/reports$ "reports";
    ~^/analytics/dashboard$ "analytics";
    ~^/analytics/.*$ "api_general";
    
    # Science intelligence
    ~^/science/.*$ "api_general";
    
    # Blockchain
    ~^/blockchain/.*$ "blockchain";
    
    # Unified data
    ~^/data/.*$ "api_general";
    
    # Default
    default "api_general";
}

# Rate limiting configuration for different HTTP methods
map $request_method $method_rate_limit {
    GET "api_general";
    POST "api_burst";
    PUT "api_burst";
    DELETE "api_general";
    PATCH "api_burst";
    default "api_general";
}

# User type detection (requires authentication)
map $http_authorization $user_type {
    ~*patient "patient_api";
    ~*provider "provider_api";
    ~*admin "admin_api";
    default "api_general";
}

# Rate limiting rules for different scenarios
# 1. Authentication endpoints - strict rate limiting
location ~ ^/auth/(login|register|password-reset) {
    limit_req zone=login burst=3 nodelay;
    limit_req zone=register burst=2 nodelay;
    limit_req zone=password_reset burst=1 nodelay;
    
    # Additional security measures
    limit_req_status 429;
    limit_req_log_level warn;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "5" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 2. Patient endpoints - moderate rate limiting
location ~ ^/patient/ {
    limit_req zone=patient_api burst=10 nodelay;
    limit_req zone=api_general burst=20 nodelay;
    
    # User-based rate limiting if authenticated
    limit_req zone=user_api burst=25 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "15" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 3. Provider endpoints - higher rate limiting
location ~ ^/provider/ {
    limit_req zone=provider_api burst=20 nodelay;
    limit_req zone=api_general burst=30 nodelay;
    
    # User-based rate limiting if authenticated
    limit_req zone=user_api burst=50 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "30" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 4. Data upload endpoints - strict upload rate limiting
location ~ ^/ingestion/(vitals|labs|medications) {
    limit_req zone=upload burst=5 nodelay;
    limit_req zone=user_upload burst=10 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "2" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 5. Large file upload endpoints - very strict rate limiting
location ~ ^/ingestion/(hl7|fhir) {
    limit_req zone=large_upload burst=2 nodelay;
    limit_req zone=user_upload burst=5 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "1" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 6. Telemedicine endpoints - special handling for video
location ~ ^/telemedicine/video-call {
    limit_req zone=video_call burst=1 nodelay;
    
    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "1" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 7. Analytics and reporting endpoints
location ~ ^/analytics/reports {
    limit_req zone=reports burst=5 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "2" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

location ~ ^/analytics/ {
    limit_req zone=analytics burst=10 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "5" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 8. Blockchain endpoints
location ~ ^/blockchain/ {
    limit_req zone=blockchain burst=5 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "3" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# 9. General API endpoints
location ~ ^/(clinical|privacy|science|data)/ {
    limit_req zone=api_general burst=20 nodelay;
    limit_req zone=user_api burst=25 nodelay;
    
    # Return rate limit headers
    add_header X-RateLimit-Limit "10" always;
    add_header X-RateLimit-Remaining $limit_req_status always;
    add_header X-RateLimit-Reset $limit_req_status always;
}

# Rate limiting error handling
error_page 429 /429.html;

location = /429.html {
    root /usr/share/nginx/html;
    internal;
}

# Rate limiting status endpoint (for monitoring)
location = /rate-limit-status {
    access_log off;
    
    # Return current rate limiting status
    return 200 '{"status": "rate_limiting_active", "zones": ["api_general", "login", "upload", "video_call", "analytics", "blockchain"]}\n';
    add_header Content-Type application/json;
}

# Rate limiting configuration for different time periods
# Peak hours (9 AM - 5 PM) - stricter rate limiting
map $time_local $peak_hours {
    ~ "09:|10:|11:|12:|13:|14:|15:|16:" "peak";
    default "off_peak";
}

# Weekend rate limiting - more lenient
map $time_local $weekend {
    ~ "(Sat|Sun)" "weekend";
    default "weekday";
}

# Dynamic rate limiting based on time
map $peak_hours$weekend $dynamic_rate_limit {
    "peakweekday" "strict";
    "peakweekend" "moderate";
    "off_peakweekday" "moderate";
    "off_peakweekend" "lenient";
    default "moderate";
}

# Rate limiting configuration for different user tiers
map $http_x_user_tier $tier_rate_limit {
    "premium" "premium";
    "standard" "standard";
    "basic" "basic";
    default "standard";
}

# Premium user rate limiting
limit_req_zone $binary_remote_addr zone=premium_api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=standard_api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=basic_api:10m rate=25r/s; 