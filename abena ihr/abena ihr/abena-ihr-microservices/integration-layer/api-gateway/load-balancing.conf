# Abena IHR API Gateway Load Balancing Configuration
# Defines load balancing strategies for microservices

# Upstream definitions with load balancing strategies
# Authentication Service - Round Robin with health checks
upstream auth_service {
    # Round Robin (default)
    server auth-service-1:3000 max_fails=3 fail_timeout=30s weight=1;
    server auth-service-2:3000 max_fails=3 fail_timeout=30s weight=1;
    server auth-service-3:3000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Patient Engagement Service - Least Connections
upstream patient_engagement {
    least_conn;
    server patient-engagement-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server patient-engagement-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server patient-engagement-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Provider Workflow Service - IP Hash for session affinity
upstream provider_workflow {
    ip_hash;
    server provider-workflow-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server provider-workflow-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server provider-workflow-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Clinical Decision Support Service - Weighted Round Robin
upstream clinical_decision_support {
    server clinical-decision-support-1:8000 max_fails=3 fail_timeout=30s weight=2;
    server clinical-decision-support-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server clinical-decision-support-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Data Ingestion Service - Least Connections with higher weight for primary
upstream data_ingestion {
    least_conn;
    server data-ingestion-1:8000 max_fails=3 fail_timeout=30s weight=3;
    server data-ingestion-2:8000 max_fails=3 fail_timeout=30s weight=2;
    server data-ingestion-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Privacy Security Service - Round Robin with backup
upstream privacy_security {
    server privacy-security-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server privacy-security-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server privacy-security-backup:8000 max_fails=3 fail_timeout=30s weight=1 backup;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Telemedicine Service - IP Hash for video session affinity
upstream telemedicine {
    ip_hash;
    server telemedicine-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server telemedicine-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server telemedicine-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Analytics Engine Service - Least Connections
upstream analytics_engine {
    least_conn;
    server analytics-engine-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server analytics-engine-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server analytics-engine-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Science Intelligence Service - Round Robin
upstream science_intelligence {
    server science-intelligence-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server science-intelligence-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server science-intelligence-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Unified Data Service - Least Connections
upstream unified_data {
    least_conn;
    server unified-data-1:5432 max_fails=3 fail_timeout=30s weight=1;
    server unified-data-2:5432 max_fails=3 fail_timeout=30s weight=1;
    server unified-data-3:5432 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Blockchain Service - Round Robin with backup
upstream blockchain {
    server blockchain-1:8080 max_fails=3 fail_timeout=30s weight=1;
    server blockchain-2:8080 max_fails=3 fail_timeout=30s weight=1;
    server blockchain-backup:8080 max_fails=3 fail_timeout=30s weight=1 backup;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Load balancing configuration for different traffic patterns
# High-traffic services with auto-scaling
upstream high_traffic_services {
    least_conn;
    server high-traffic-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server high-traffic-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server high-traffic-3:8000 max_fails=3 fail_timeout=30s weight=1;
    server high-traffic-4:8000 max_fails=3 fail_timeout=30s weight=1;
    server high-traffic-5:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Health check configuration
    keepalive 64;
    keepalive_requests 200;
    keepalive_timeout 60s;
}

# Critical services with failover
upstream critical_services {
    server critical-1:8000 max_fails=2 fail_timeout=20s weight=1;
    server critical-2:8000 max_fails=2 fail_timeout=20s weight=1;
    server critical-backup-1:8000 max_fails=2 fail_timeout=20s weight=1 backup;
    server critical-backup-2:8000 max_fails=2 fail_timeout=20s weight=1 backup;
    
    # Health check configuration
    keepalive 16;
    keepalive_requests 50;
    keepalive_timeout 30s;
}

# Geographic load balancing (if using multiple regions)
upstream us_region {
    server us-east-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server us-west-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server us-central-1:8000 max_fails=3 fail_timeout=30s weight=1;
}

upstream eu_region {
    server eu-west-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server eu-central-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server eu-north-1:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Load balancing based on request type
map $request_method $upstream_method {
    GET "read_servers";
    POST "write_servers";
    PUT "write_servers";
    DELETE "write_servers";
    PATCH "write_servers";
    default "read_servers";
}

# Read-optimized servers
upstream read_servers {
    least_conn;
    server read-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server read-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server read-3:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Write-optimized servers
upstream write_servers {
    least_conn;
    server write-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server write-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server write-3:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Load balancing configuration for different user tiers
map $http_x_user_tier $tier_upstream {
    "premium" "premium_servers";
    "standard" "standard_servers";
    "basic" "basic_servers";
    default "standard_servers";
}

# Premium tier servers (higher performance)
upstream premium_servers {
    least_conn;
    server premium-1:8000 max_fails=2 fail_timeout=20s weight=2;
    server premium-2:8000 max_fails=2 fail_timeout=20s weight=2;
    server premium-3:8000 max_fails=2 fail_timeout=20s weight=1;
}

# Standard tier servers
upstream standard_servers {
    least_conn;
    server standard-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server standard-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server standard-3:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Basic tier servers (lower priority)
upstream basic_servers {
    least_conn;
    server basic-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server basic-2:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Health check configuration
# Active health checks for critical services
upstream health_check_services {
    server health-check-1:8000 max_fails=1 fail_timeout=10s;
    server health-check-2:8000 max_fails=1 fail_timeout=10s;
    
    # Health check interval
    keepalive 8;
    keepalive_requests 20;
    keepalive_timeout 10s;
}

# Load balancing configuration for WebSocket connections
upstream websocket_services {
    ip_hash;  # Session affinity for WebSocket connections
    server websocket-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server websocket-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server websocket-3:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # WebSocket-specific configuration
    keepalive 16;
    keepalive_requests 50;
    keepalive_timeout 300s;  # Longer timeout for WebSocket connections
}

# Load balancing configuration for file upload services
upstream upload_services {
    least_conn;  # Distribute upload load evenly
    server upload-1:8000 max_fails=3 fail_timeout=60s weight=1;
    server upload-2:8000 max_fails=3 fail_timeout=60s weight=1;
    server upload-3:8000 max_fails=3 fail_timeout=60s weight=1;
    
    # Upload-specific configuration
    keepalive 8;
    keepalive_requests 10;
    keepalive_timeout 120s;  # Longer timeout for file uploads
}

# Load balancing configuration for batch processing services
upstream batch_services {
    least_conn;
    server batch-1:8000 max_fails=3 fail_timeout=300s weight=1;
    server batch-2:8000 max_fails=3 fail_timeout=300s weight=1;
    server batch-3:8000 max_fails=3 fail_timeout=300s weight=1;
    
    # Batch processing configuration
    keepalive 4;
    keepalive_requests 5;
    keepalive_timeout 600s;  # Very long timeout for batch processing
}

# Load balancing status monitoring
# Endpoint to check load balancing status
location = /load-balancer-status {
    access_log off;
    
    # Return load balancing status
    return 200 '{"status": "load_balancing_active", "upstreams": ["auth_service", "patient_engagement", "provider_workflow", "clinical_decision_support", "data_ingestion", "privacy_security", "telemedicine", "analytics_engine", "science_intelligence", "unified_data", "blockchain"]}\n';
    add_header Content-Type application/json;
}

# Load balancing metrics endpoint
location = /load-balancer-metrics {
    access_log off;
    stub_status on;
}

# Load balancing configuration for different time periods
# Peak hours load balancing
map $time_local $peak_hours {
    ~ "09:|10:|11:|12:|13:|14:|15:|16:" "peak";
    default "off_peak";
}

# Peak hours upstream (more servers)
upstream peak_hours_services {
    least_conn;
    server peak-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server peak-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server peak-3:8000 max_fails=3 fail_timeout=30s weight=1;
    server peak-4:8000 max_fails=3 fail_timeout=30s weight=1;
    server peak-5:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Off-peak hours upstream (fewer servers)
upstream off_peak_services {
    least_conn;
    server off-peak-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server off-peak-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server off-peak-3:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Load balancing configuration for different request sizes
map $content_length $request_size {
    ~^[0-9]{1,6}$ "small";
    ~^[0-9]{7,8}$ "medium";
    default "large";
}

# Small request upstream (fast processing)
upstream small_request_services {
    least_conn;
    server small-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server small-2:8000 max_fails=3 fail_timeout=30s weight=1;
    server small-3:8000 max_fails=3 fail_timeout=30s weight=1;
}

# Large request upstream (more resources)
upstream large_request_services {
    least_conn;
    server large-1:8000 max_fails=3 fail_timeout=60s weight=1;
    server large-2:8000 max_fails=3 fail_timeout=60s weight=1;
    server large-3:8000 max_fails=3 fail_timeout=60s weight=1;
} 