[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: Unit tests for individual components
    integration: Integration tests for cross-module interactions
    e2e: End-to-end tests for complete workflows
    performance: Performance and load tests
    security: Security and compliance tests
    slow: Slow running tests that may take longer to execute
    clinical: Tests for clinical accuracy and validation
    benchmark: Benchmark tests for performance monitoring
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning 