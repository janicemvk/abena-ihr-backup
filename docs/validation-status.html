    .logo {

      background: linear-gradient(135deg, var(--accent), var(--purple));

      font-size: 22px; flex-shrink: 0;

    .header-meta { text-align: right; }
    .last-updated { font-size: 12px; color: var(--muted); }
    .version-badge {
      display: inline-block; background: var(--blue-dim);

      border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; margin-top: 6px;

    .summary-bar {
      max-width: 1100px; margin: 24px auto 0;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 700; margin: 4px 0 2px; line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--muted); }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.blue  .stat-value { color: var(--blue); }
    .stat-card.yellow .stat-value { color: var(--yellow); }
    .stat-card.purple .stat-value { color: var(--purple); }
    .progress-wrap { max-width: 1100px; margin: 20px auto 0; padding: 0 40px; }
    .progress-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
    }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-title { font-size: 13px; font-weight: 600; }
    .progress-pct { font-size: 13px; color: var(--muted); }
    .progress-track { height: 8px; background: var(--border2); border-radius: 4px; overflow: hidden; display: flex; gap: 2px; }

    thead th {

    .badge {

    .badge-muted  { background: var(--border);     color: var(--muted);  border: 1px solid var(--border2); }
    .detail-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .test-meta { font-size: 12px; color: var(--muted); }
    .eta-week { display: inline-block; background: var(--border); padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--muted); }
    .bench-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 4px; }
    .bench-card { border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; background: var(--surface); }
    .bench-card-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .bench-item { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .bench-item:last-child { border-bottom: none; padding-bottom: 0; }
    .bench-pallet { font-family: monospace; font-size: 12px; }
    .bench-complete-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-top: 4px; }
    .bench-complete-item {
      text-align: center; padding: 10px; background: var(--green-dim);
      border: 1px solid rgba(63,185,80,0.2); border-radius: 8px;

    .node-table th, .node-table td { padding: 10px 14px; }
    footer {
      border-top: 1px solid var(--border); padding: 20px 40px;
      max-width: 1100px; margin: 0 auto;

    .footer-link { font-size: 12px; color: var(--blue); text-decoration: none; }

    @media (max-width: 768px) {

      .bench-grid { grid-template-columns: 1fr; }
      .bench-complete-grid { grid-template-columns: repeat(2, 1fr); }

// Badge configs
const TEST_BADGE = {
  passed:      { cls: "badge-green",  icon: "✓", label: "Passed" },
  suite_ready: { cls: "badge-blue",   icon: "⏳", label: "Suite ready" },

  minimal:     { cls: "badge-orange", icon: "⚠", label: "Minimal" },
  stub:        { cls: "badge-red",    icon: "✗", label: "Stub" },
};

  complete:   { cls: "badge-green",  icon: "✓", label: "Complete" },
  macro_only: { cls: "badge-orange", icon: "⚠", label: "Shell only" },
  stub:       { cls: "badge-orange", icon: "⚠", label: "Stub" },
  none:       { cls: "badge-red",    icon: "✗", label: "None" },
};

function badge(cfg, extra) {
  return `<span class="badge ${cfg.cls}">${cfg.icon} ${cfg.label}${extra ? ' ' + extra : ''}</span>`;
}

function testCell(p) {
  const b = TEST_BADGE[p.testStatus];
  const date = p.testedDate ? `<div class="detail-note">Confirmed ${p.testedDate}</div>` : '';
  return `${badge(b)}<div class="test-meta">${p.testFns} fns · ${p.testLines.toLocaleString()} lines</div>${date}`;
}

function benchCell(p) {
  const b = BENCH_BADGE[p.benchStatus];
  const extra = p.benchStatus === 'complete'
    ? `<span class="test-meta" style="margin-left:4px">${p.benchFns} fns · ${p.benchLines} lines</span>`
    : '';
  const note = p.benchNote ? `<div class="detail-note">${p.benchNote}</div>` : '';
  return badge(b) + extra + note;
}

function row(p) {
  const eta = p.eta === '—' ? '<span style="color:var(--muted)">—</span>'
                             : `<span class="eta-week">${p.eta}</span>`;
  return `<tr>
    <td class="pallet-name"><code>${p.name}</code></td>
    <td>${testCell(p)}</td>
    <td>${benchCell(p)}</td>
    <td>${eta}</td>
  </tr>`;
}

function section(icon, title, pallets) {
  if (!pallets.length) return '';
  const count = `<span class="section-count">${pallets.length} pallet${pallets.length > 1 ? 's' : ''}</span>`;
  return `
    <div class="section-header">
      <span class="section-icon">${icon}</span>
      <span class="section-title">${title}</span>
      ${count}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Pallet</th><th>Tests</th><th>Benchmarks</th><th>ETA</th>
        </tr></thead>
        <tbody>${pallets.map(row).join('')}</tbody>
      </table>
    </div>`;
}

      </div>
      <div class="header-meta">
        <div class="last-updated">Last updated: ${META.lastUpdated}</div>
        <div class="version-badge">${META.sdkVersion}</div>
      </div>
    </div>

    <div class="summary-bar">
      <div class="stat-card green">
        <div class="stat-label">Runtime Integrated</div>
        <div class="stat-value">${total}<span style="font-size:16px;color:var(--muted)">/${total}</span></div>
        <div class="stat-sub">All pallets in construct_runtime!</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Validated &amp; Working</div>
        <div class="stat-value">${validated}<span style="font-size:16px;color:var(--muted)">/${total}</span></div>
        <div class="stat-sub">Tests run &amp; confirmed passing</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">Comprehensive Tests</div>
        <div class="stat-value">${comprehensive}<span style="font-size:16px;color:var(--muted)">/${total}</span></div>
        <div class="stat-sub">50+ test functions each</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Benchmarks Complete</div>
        <div class="stat-value">${benchDone}<span style="font-size:16px;color:var(--muted)">/${total}</span></div>
        <div class="stat-sub">Real benchmark functions present</div>
      </div>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">Overall Validation Progress</span>
      <span class="progress-pct">${validated} of ${total} fully validated · ${pctValidated}% complete</span>
    </div>
    <div class="progress-track">
      <div class="progress-seg" style="width:${pctValidated}%;background:var(--green)" title="Validated: ${validated}"></div>
      <div class="progress-seg" style="width:${pctSuiteReady}%;background:var(--blue)"  title="Suite ready"></div>
      <div class="progress-seg" style="width:${pctBasic}%;background:var(--yellow)"    title="Basic tests"></div>
      <div class="progress-seg" style="width:${pctStub}%;background:#3d2b2b"           title="Stubs/minimal"></div>
    </div>
    <div class="progress-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Validated (${validated})</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Suite ready (${PALLETS.filter(p=>p.testStatus==='suite_ready').length})</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Basic tests (${PALLETS.filter(p=>p.testStatus==='basic').length})</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3d2b2b"></div>Stubs / minimal (${PALLETS.filter(p=>['minimal','stub'].includes(p.testStatus)).length})</div>
    </div>
  </div>
</div>

<main>

  ${groups.map(g => section(g.icon, g.title, g.pallets)).join('')}

  <!-- Benchmark detail -->
  <div class="section-header" style="margin-top:40px">
    <span class="section-icon">📊</span>
    <span class="section-title">Benchmark Status Detail</span>
  </div>

  <div class="bench-grid">

    <div class="bench-card">
      <div class="bench-card-title">
        <span class="badge badge-red">✗ Entirely Missing</span>
        <span style="color:var(--muted);font-size:12px;font-weight:400">No benchmarking.rs · ${benchMissing.length} pallets</span>
      </div>
      ${benchMissing.map(p => `
        <div class="bench-item">
          <span class="bench-pallet">${p.name}</span>
          <span class="detail-note">${p.benchNote}</span>
        </div>`).join('')}
    </div>

    <div class="bench-card">
      <div class="bench-card-title">
        <span class="badge badge-orange">⚠ Needs More Than Minimal Work</span>
        <span style="color:var(--muted);font-size:12px;font-weight:400">File exists, 0 fns · ${benchShell.length} pallets</span>
      </div>
      ${benchShell.map(p => `
        <div class="bench-item">
          <span class="bench-pallet">${p.name} <span style="color:var(--muted)">(${p.benchLines} lines)</span></span>
          <span class="detail-note">${p.benchNote}</span>
        </div>`).join('')}
    </div>

    <div class="bench-card" style="grid-column:1/-1">
      <div class="bench-card-title">
        <span class="badge badge-green">✓ Benchmarks Complete</span>
        <span style="color:var(--muted);font-size:12px;font-weight:400">${benchDone} pallets · real benchmark functions present</span>
      </div>
      <div class="bench-complete-grid">
        ${PALLETS.filter(p => p.benchStatus === 'complete').map(p => `
          <div class="bench-complete-item">
            <div style="font-family:monospace;font-size:12px;color:var(--green)">${p.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px">${p.benchFns} fns · ${p.benchLines} lines</div>
          </div>`).join('')}
      </div>
    </div>

  </div>

  <!-- Node status -->
  <div class="section-header" style="margin-top:40px">
    <span class="section-icon">🖥</span>
    <span class="section-title">Node Status</span>
  </div>
  <div class="table-wrap">
    <table class="node-table">
      <thead><tr><th>Component</th><th>Status</th><th>Details</th></tr></thead>
      <tbody>${NODE_STATUS.map(nodeStatusRow).join('')}</tbody>
    </table>
  </div>

</main>

<footer>
  <div class="footer-left">ABENA Blockchain · ${META.sdkVersion} · ${META.rustVersion}</div>
  <div class="footer-right">
    <a class="footer-link" href="https://polkadot.js.org/apps/?rpc=ws%3A%2F%2F127.0.0.1%3A9944" target="_blank">Polkadot.js Apps ↗</a>
    <a class="footer-link" href="${META.githubUrl}" target="_blank">GitHub ↗</a>
  </div>
</footer>
`;
</script>
</body>
</html>
