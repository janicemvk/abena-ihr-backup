[env]
# Use system OpenSSL from vcpkg instead of building from source
OPENSSL_DIR = "C:\\vcpkg\\installed\\x64-windows-static"
OPENSSL_STATIC = "1"
OPENSSL_NO_VENDOR = "1"
OPENSSL_LIB_DIR = "C:\\vcpkg\\installed\\x64-windows-static\\lib"
OPENSSL_INCLUDE_DIR = "C:\\vcpkg\\installed\\x64-windows-static\\include"

# Protocol Buffers compiler path
PROTOC = "C:\\protoc\\bin\\protoc.exe"

# Linker library path for OpenSSL
LIB = "C:\\vcpkg\\installed\\x64-windows-static\\lib"

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-L", "C:\\vcpkg\\installed\\x64-windows-static\\lib",
]

