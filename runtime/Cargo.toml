[package]
name = "abena-runtime"
version = "4.0.0-dev"
description = "ABENA Healthcare Blockchain Runtime"
authors = ["ABENA Healthcare Platform"]
license = "Unlicense"
edition = "2021"

[package.metadata]
docs.rs = { document-private-items = true }

[dependencies]
codec = { package = "parity-scale-codec", version = "3.4.0", default-features = false, features = ["derive"] }
scale-info = { version = "2.11.1", default-features = false, features = ["derive"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }

# Substrate
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-block-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-consensus-aura = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-offchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-session = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-transaction-pool = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-version = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-genesis-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
sp-io = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false, features = ["disable_panic_handler"] }

# Substrate FRAME
frame-benchmarking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false, optional = true }
frame-executive = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
frame-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
frame-system-benchmarking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
frame-system-rpc-runtime-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
frame-try-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false, optional = true }
pallet-aura = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
pallet-balances = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
pallet-sudo = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
pallet-timestamp = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
pallet-transaction-payment = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }
pallet-transaction-payment-rpc-runtime-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512", default-features = false }

# Custom pallets
pallet-patient-health-records = { path = "../pallets/patient-health-records", default-features = false }
pallet-abena-coin = { path = "../pallets/abena-coin", default-features = false }
pallet-quantum-computing = { path = "../pallets/quantum-computing", default-features = false }
pallet-patient-identity = { path = "../pallets/patient-identity", default-features = false }
pallet-health-record-hash = { path = "../pallets/health-record-hash", default-features = false }
pallet-treatment-protocol = { path = "../pallets/treatment-protocol", default-features = false }
pallet-interoperability = { path = "../pallets/interoperability", default-features = false }
pallet-governance = { path = "../pallets/governance", default-features = false }
pallet-fee-management = { path = "../pallets/fee-management", default-features = false }
pallet-access-control = { path = "../pallets/access-control", default-features = false }
pallet-account-management = { path = "../pallets/account-management", default-features = false }
pallet-data-separation = { path = "../pallets/data-separation", default-features = false }
pallet-quantum-results = { path = "../pallets/quantum-results", default-features = false }
pallet-data-marketplace = { path = "../pallets/data-marketplace", default-features = false }
pallet-permissioned-validators = { path = "../pallets/permissioned-validators", default-features = false }
pallet-private-channels = { path = "../pallets/private-channels", default-features = false }
pallet-enterprise-identity = { path = "../pallets/enterprise-identity", default-features = false }
pallet-consortium-governance = { path = "../pallets/consortium-governance", default-features = false }

[build-dependencies]
abena-build-fix = { path = "../build-fix" }
substrate-wasm-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512" }

[dev-dependencies]
sp-io = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512" }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512" }

[features]
default = ["std"]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "pallet-balances/runtime-benchmarks",
    "pallet-patient-health-records/runtime-benchmarks",
    "pallet-abena-coin/runtime-benchmarks",
