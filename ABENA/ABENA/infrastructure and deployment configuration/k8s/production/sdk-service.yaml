apiVersion: apps/v1
kind: Deployment
metadata:
  name: abena-shared-sdk
  namespace: abena-ihr
  labels:
    app: abena-shared-sdk
    component: sdk
spec:
  replicas: 3
  selector:
    matchLabels:
      app: abena-shared-sdk
  template:
    metadata:
      labels:
        app: abena-shared-sdk
        component: sdk
    spec:
      containers:
      - name: sdk-service
        image: abena-shared-sdk:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: SDK_PORT
          value: "3001"
        - name: SDK_CACHE_TTL
          value: "3600"
        - name: SDK_RETRY_ATTEMPTS
          value: "3"
        - name: SDK_TIMEOUT
          value: "30000"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        volumeMounts:
        - name: sdk-cache
          mountPath: /app/cache
        - name: sdk-logs
          mountPath: /app/logs
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
      volumes:
      - name: sdk-cache
        emptyDir: {}
      - name: sdk-logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sdk-service
  namespace: abena-ihr
spec:
  selector:
    app: abena-shared-sdk
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
  type: ClusterIP 